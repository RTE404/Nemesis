# render.yaml - Render Blueprint for AI Red Teaming Platform
# Docs: https://render.com/docs/blueprint-spec

services:
  # ── Backend (FastAPI) ──────────────────────────────────────────────
  - type: web
    name: nemesis-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    envVars:
      - key: DATABASE_URL
        value: sqlite:///./data/redteam.db
      - key: GEMINI_API_KEY
        sync: false   # You will paste this in the Render dashboard

  # ── Frontend (React/Vite → Static Site) ───────────────────────────
  - type: web
    name: nemesis-frontend
    runtime: static
    buildCommand: npm ci && npm run build
    staticPublishPath: ./dist
    rootDir: ./frontend
    plan: free
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: nemesis-backend
          property: host
          format: https://{value}   # auto-fills with backend's Render URL
