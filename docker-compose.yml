services:
  backend:
    build: ./backend
    ports:
      - "8000:7860"
    env_file:
      - ./backend/.env
    environment:
      - DATABASE_URL=sqlite:///./data/redteam.db
    volumes:
      - redteam-data:/app/data

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  redteam-data:
