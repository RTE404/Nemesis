# render.yaml - Render Blueprint for AI Red Teaming Platform
# Docs: https://render.com/docs/blueprint-spec

services:
  # ── Backend (FastAPI) ──────────────────────────────────────────────
  - type: web
    name: nemesis-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    # No plan field — defaults to free/starter tier
    envVars:
      - key: DATABASE_URL
        value: sqlite:///./data/redteam.db
      - key: GEMINI_API_KEY
        sync: false   # Paste your key in the Render dashboard

  # ── Frontend (React/Vite → Static Site) ───────────────────────────
  - type: web
    name: nemesis-frontend
    runtime: static
    buildCommand: npm ci && npm run build
    staticPublishPath: ./dist
    rootDir: ./frontend
    # Static sites have no plan — they are always free
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        sync: false   # After backend deploys, paste its URL here (e.g. https://nemesis-backend.onrender.com)
